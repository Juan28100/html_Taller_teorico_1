<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Titulos o encabezados:
    Se tiene 6 tipos de encabezados, desde el h1 hasta el h6. -->
    <!-- (h$*6) Crea 6 Titulos en orden del 1 al 6 Emmet -->
    <h1>Titulo</h1>
    <!-- El h1 se utiliza una sola vez por pagina web esto es debido a que el h1 tiene una importancia en el CEO lo que es el posicionamiento Web, es decir, google le da mucha importancia al h1 -->
    <h2>Subtitulo</h2>
    <h3>Subtitulo</h3>
    <h4>Subtitulo</h4>
    <h5>Subtitulo</h5>
    <h6>Subtitulo</h6>
    <!-- Desde el h2 hasta el h6, se puede utilizar las veces que sean necesarias segun el contenido que se quiera recrear.  -->

    <!-- Parrafo: los parrafos deben tener una idea o punto especifico.
    Cada parrafo escrito debe de contener un concepto, una idea . Es decir, puedes describir una seccion o un elemento o un elemento, hasta un mensaje en el chat. Por ejemplo en una sección se habla sobre los beneficios del ejercicio: Un parrafo puede tratar de mejorar la salud cardiovascular y otro puede ser sobre los beneficios y cuidados de la salud mental. Finalmente, debe existir un motivo para que exista un parrafo. -->
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Necessitatibus veniam animi excepturi fugit iste dolorem consectetur neque tenetur temporibus ratione aperiam nisi adipisci explicabo, nesciunt tempora nostrum similique est non?
    </p>
    <!-- (CTRL+SHIFT+P ) o (ALT+Z) ajusta el contenido del parrafo a la ventana del editor -->
    <!--Existen algunas tecnologias de asistencia como lectores de pantalla, que ayudan a las personas con discapacidad visual a navegar por el contenido web. Por ejemplo: cuando estas tecnologias leen el h1 de la pagina, entienden de que trata la pagina por el h1. Por temas de accesibilidad web es importante que se utiliza solo un h1 por pagina-->
</body>
</html>
