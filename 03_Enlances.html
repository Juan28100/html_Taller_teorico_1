<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENLACES</title>
</head>
<body>
    <!-- Los enlaces o anclas o hipervinculos -->
    <!--a (anchor) significa ancla. Metafora: como en un barco te mantiene en una ubicacion especifica un ancla es justamente para que el usuario sepa hacia donde navegar en la pagina web.  -->
    
    <!-- Los atributos son caracteristicas que definen el comportamiento y la apariencia de los elementos en este caso el atributo href vuelve funcional a la etiqueta es por esta razon que se utiliza en el maquetado y no en el css dado que no es una caracteristica visual-->

    <!-- href (hyper reference) es la referencia a un recurso, es decir, el destino del enlace -->
    <!-- lo que esta dentro de la etiqueta a es el texto visible que el usuario vera en la pagina web. Mientras que lo que esta dentro de href es la referencia al que apunta el enlace -->
    <h2 title="Enlaces o anclas">Enlaces o Anclas</h2>
    <!-- por otra parte, el atributo title proporciona un texto de ayuda que se muestra cuando el usuario pasa el mouse sobre el enlace. Las tecnologias de asistencia como lectores de pantalla utilizan este atributo para proporcionar informacion adicionalal usuario. En el caso de personas invidentes les permite acceder a informacion adicional sobre el enlace -->
    
    <a href="https://www.google.com" title="Google">Google</a>
    <br>
    <a href="https://www.facebook.com" title="Facebook">Facebook</a>
    <br>
    <a href="https://www.youtube.com" title="YouTube">YouTube</a>
    <br>
    <a title="Ir a canal de youtube" href="https://www.youtube.com/@jj_correa-k9o">JuanCorrea</a>
    <br>
    <br>
    <a href="03-1_pagina_enlace_1.html">Ir a enlace web</a>
    <br>
    <br>
    <a href="03-1_pagina_enlace_2.html">Ir a enlace web 2</a>
    <br>
    <br>
    <a href="03-1_pagina_enlace_3.html">Ir a enlace web 3</a>
    <!-- Es sumamente importante que en la programcion y el desarrollo web se realicen las practicas a medida que se va avanzando, de esta forma se asegura una mejor compresion y aplicacion de los conceptos aprendidos. Entienden que la programcion es un proceso activo no pasivo, una cosa es intentar comprender lo que sucede leen o ven algo que se esta haciendo, sin embargo, la unica forma de aprender es probando ustedes mismos todo lo que se debe implementar -->
    <br>
    <br>

    <h2>Enlaces con target a otra ventana</h2>
    <a href="03-1_pagina_enlace_4.html" target="_blank">Ir a enlace cuatro en nueva ventana</a>
    <!-- El atributo target="_blank" abre el enlace en una nueva ventana o pestaña del navegador. Por defecto siempre esta en self que significa que se abre en la misma ventana -->
</body>
</html>
