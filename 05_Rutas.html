<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Explicacion: Rutas Absolutas y Relativas</h1>

    <section>
        <h2>Rutas Absolutas</h2>
        <!-- Ruta completa a un recurso en un servidor externo, la ruta absoluta es la URL completa del recurso, esta no se modifica segun la ubicacion del archivo actual -->
        <p>
            Para ir a un sitio externo, como el catalogo global de repuestos, usamos la url completa:
            <a href="https://www.shimano.com">Visitar Shimano Internacional</a>
        </p>
        <img src="https://www.manualweb.net/img/covers/html5-cover.jpg" alt="Imagen HTML desde un servidor externo" width="300" height="200" title="HTML 5">
    </section>

    <hr>

    <section>
        <h2>Rutas Relativas</h2>
        <!-- ruta relativa a un recurso dentro del mismo proyecto. La ruta relativa se basa en la ubicacion del archivo actual, y se ajusta segun la estructura de carpetas del proyecto -->
        <p>
            Ir a la pagina de <a href="04_inline_inblok.html">Incline vs Block</a>
            <!-- Funciona si hay un archivo llamado "04_inline_inblok.html" en la misma carpeta -->
        </p>

        <p>
            Ver foto de tecnologia <a href="img/img_css.png">CSS</a>
            <!-- Funciona si hay una imagen llamada "img_css.png" en la carpeta "img" -->
        </p>
    </section>
</body>
</html>
