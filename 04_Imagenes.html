<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagenes</title>
</head>
<body>
    <!-- etiquetas de bloques y etiquetas de linea -->
    <h1>Imagenes</h1>
    <!-- las imagenes se insertan en HTML utilizando la etiqueta <img>. Esta etiqueta es un elemento vacio, lo que significa que no tiene una etiqueta de cierre. La sintaxis basica para insertar una imagen es: -->
    <img src="04_imagen.jpg" alt="Imagen basica" title="Imagen basica" width="200" height="200">
    <!-- Para los lectores de pantalla puedan saber de que se trata la imagen el atributo alt (alternative text) es muy importante puesto una descripcion textual de la imagen para accesibilidad y como falback si no se carga, El texto alternatico debe de ser descriptivo y conciso, y debe transmitir la informacion esencial que la imagen representa. Por ejemplo, si la imagen es un logotipo de una empresa, el texto alternativo seria "Logotipo de la empresa XYZ". Si la imagen es una fotografia de un paisaje, el texto alternativo podria ser "Fotografia de un paisaje y un lago". En resumen, el atributo alt proporciona una descripcion de la imagen en caso de que no se puede cargar -->

    <!-- Self closing Tags son etiquetas que se autocierran -->
</body>
</html>
